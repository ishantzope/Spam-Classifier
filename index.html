<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Classification Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: linear-gradient(-45deg, #3b82f6, #ec4899, #8b5cf6, #06b6d4, #10b981);
            background-size: 300% 300%;
            animation: gradientBG 20s ease infinite;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating background shapes */
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: -1;
            margin: 0;
            padding: 0;
        }

        .bg-shapes li {
            position: absolute;
            display: block;
            list-style: none;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: float 25s linear infinite;
            bottom: -150px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
        }

        .bg-shapes li:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .bg-shapes li:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
        .bg-shapes li:nth-child(3) { left: 70%; width: 30px; height: 30px; animation-delay: 4s; }
        .bg-shapes li:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
        .bg-shapes li:nth-child(5) { left: 65%; width: 40px; height: 40px; animation-delay: 0s; }
        .bg-shapes li:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; }
        .bg-shapes li:nth-child(7) { left: 35%; width: 150px; height: 150px; animation-delay: 7s; }
        .bg-shapes li:nth-child(8) { left: 50%; width: 25px; height: 25px; animation-delay: 15s; animation-duration: 45s; }
        .bg-shapes li:nth-child(9) { left: 20%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 35s; }
        .bg-shapes li:nth-child(10) { left: 85%; width: 150px; height: 150px; animation-delay: 0s; animation-duration: 11s; }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 12px; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; }
        }

        /* UI Panel */
        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15), inset 0 0 0 1px rgba(255, 255, 255, 0.2);
            border-radius: 1.5rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1rem;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #ffffff;
            transition: all 0.3s ease;
        }
        
        .input-glass:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.3);
            outline: none;
        }
        
        .input-glass::placeholder {
            color: rgba(255, 255, 255, 0.8);
        }

        .btn-primary {
            background: rgba(255, 255, 255, 0.95);
            color: #1e293b;
            border: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            font-weight: 600;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            background: #ffffff;
        }

        /* Result styling */
        .ham-bg {
            background: rgba(16, 185, 129, 0.25);
            border: 1px solid rgba(16, 185, 129, 0.6);
            color: #ffffff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        
        .spam-bg {
            background: rgba(239, 68, 68, 0.25);
            border: 1px solid rgba(239, 68, 68, 0.6);
            color: #ffffff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.5); }
        
        .fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="p-4 sm:p-8 flex items-center justify-center relative w-full min-h-screen">

    <!-- Floating Background Effects -->
    <ul class="bg-shapes">
        <li></li><li></li><li></li><li></li><li></li>
        <li></li><li></li><li></li><li></li><li></li>
    </ul>

    <div class="w-full max-w-5xl glass-panel p-6 sm:p-12 mx-auto fade-in" style="animation-delay: 0.1s;">
        
        <header class="mb-10 text-center relative border-b border-white/20 pb-8">
            <h1 class="text-4xl xl:text-5xl font-bold tracking-tight mb-3">
                Data Classification
            </h1>
            <p class="text-white/80 font-medium max-w-2xl mx-auto">
                Real-time message analysis & content filtering
            </p>
        </header>

        <section class="mb-10 fade-in" style="animation-delay: 0.2s;">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold tracking-wide">System Metrics</h2>
                <span class="text-xs font-bold px-3 py-1.5 rounded-full bg-white/20 border border-white/30 backdrop-blur-md shadow-sm">
                    Status: Online
                </span>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Stat Card 1 -->
                <div class="stat-card p-6">
                    <p class="text-sm font-semibold text-white/70 mb-2 uppercase tracking-wider">Total Records</p>
                    <p id="stat-samples" class="text-3xl font-bold">--</p>
                </div>

                <!-- Stat Card 2 -->
                <div class="stat-card p-6">
                    <p class="text-sm font-semibold text-white/70 mb-2 uppercase tracking-wider">Model Accuracy</p>
                    <p id="stat-accuracy" class="text-3xl font-bold">--%</p>
                </div>

                <!-- Stat Card 3 -->
                <div class="stat-card p-6">
                    <p class="text-sm font-semibold text-white/70 mb-2 uppercase tracking-wider">Class Distribution</p>
                    <p id="stat-prevalence" class="text-3xl font-bold">--%</p>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-5 gap-10">
            <!-- Main Content Area -->
            <section class="lg:col-span-3 fade-in" style="animation-delay: 0.3s;">
                <h2 class="text-lg font-semibold tracking-wide mb-4 text-white/90">Manual Entry</h2>

                <form id="prediction-form" class="space-y-5">
                    <div>
                        <textarea id="message-input" rows="5" placeholder="Enter message text here to analyze..." required
                                  class="w-full p-4 rounded-xl input-glass text-lg resize-none"></textarea>
                    </div>

                    <button type="submit" id="submit-btn" class="py-3 px-6 w-full btn-primary text-lg rounded-xl flex justify-center items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        Process Data
                    </button>
                </form>

                <div id="loading-indicator" class="mt-6 text-white/80 hidden font-medium flex items-center justify-center gap-3 bg-white/10 p-4 rounded-xl border border-white/20">
                    <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Executing Analysis...
                </div>

                <div id="result-container" class="mt-6 p-6 rounded-xl hidden transition-all duration-300" role="status">
                    <p class="text-sm font-semibold uppercase opacity-90 mb-2 tracking-wider">Classification Result</p>
                    <p id="result-text" class="text-3xl font-bold tracking-tight"></p>
                </div>
            </section>

            <!-- Sidebar Log -->
            <section class="lg:col-span-2 fade-in" style="animation-delay: 0.4s;">
                <h2 class="text-lg font-semibold tracking-wide mb-4 text-white/90">Event Log</h2>
                <div id="history-list" class="space-y-3 max-h-[350px] overflow-y-auto pr-2 custom-scrollbar">
                    <div id="history-placeholder" class="text-white/60 text-center p-6 bg-white/5 rounded-xl border border-white/20 border-dashed">
                        <p class="font-medium">No recent events</p>
                    </div>
                </div>
            </section>
        </div>

    </div>

    <script>
        let classificationHistory = [];
        const API_BASE = 'http://127.0.0.1:5001';

        async function fetchStats() {
            try {
                const response = await fetch(`${API_BASE}/stats`);
                if(response.ok) {
                    const data = await response.json();
                    document.getElementById("stat-samples").innerText = data.total_samples.toLocaleString();
                    document.getElementById("stat-accuracy").innerText = data.accuracy.toFixed(1) + "%";
                    document.getElementById("stat-prevalence").innerText = data.spam_prevalence.toFixed(1) + "%";
                }
            } catch (err) {
                console.warn("Could not fetch stats", err);
            }
        }

        function renderHistory() {
            const historyList = document.getElementById('history-list');
            const placeholder = document.getElementById('history-placeholder');
            if (classificationHistory.length === 0) return;
            if (placeholder) placeholder.remove();

            const recentHistory = classificationHistory.slice(0, 10);
            historyList.innerHTML = recentHistory.map((item) => {
                const isSpam = item.prediction.includes('SPAM');
                const badgeClass = isSpam ? 'bg-red-500/30 text-white border-red-400/50 shadow-sm' : 'bg-emerald-500/30 text-white border-emerald-400/50 shadow-sm';
                
                return `
                    <div class="p-4 rounded-xl bg-white/10 border border-white/20 flex flex-col gap-2 hover:bg-white/15 transition-colors">
                        <div class="flex justify-between items-center text-xs">
                            <span class="text-white/60 font-mono font-medium">${item.time}</span>
                            <span class="font-bold tracking-wider py-1 px-2.5 rounded border ${badgeClass}">
                                ${isSpam ? 'SPAM' : 'OK'}
                            </span>
                        </div>
                        <p class="text-sm text-white/90 line-clamp-2" title="${item.message}">"${item.message}"</p>
                    </div>
                `;
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchStats();

            document.getElementById('prediction-form').addEventListener('submit', async function(e) {
                e.preventDefault();

                const messageInput = document.getElementById('message-input');
                const message = messageInput.value.trim();
                const resultContainer = document.getElementById('result-container');
                const resultText = document.getElementById('result-text');
                const loadingIndicator = document.getElementById('loading-indicator');
                const submitBtn = document.getElementById('submit-btn');

                if (!message) return;

                resultContainer.classList.add('hidden');
                loadingIndicator.classList.remove('hidden');
                
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-75', 'cursor-not-allowed');

                try {
                    const response = await fetch(`${API_BASE}/predict`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: message })
                    });

                    if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
                    
                    const data = await response.json();
                    if (data.error) throw new Error(data.error);

                    const isSpam = data.prediction.includes('SPAM');
                    resultText.innerText = isSpam ? 'SPAM DETECTED' : 'CLEAN';

                    resultContainer.className = 'mt-6 p-6 rounded-xl hidden';
                    if(isSpam) {
                        resultContainer.classList.add('spam-bg');
                    } else {
                        resultContainer.classList.add('ham-bg');
                    }
                    
                    loadingIndicator.classList.add('hidden');
                    resultContainer.classList.remove('hidden');

                    const now = new Date();
                    const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

                    classificationHistory.unshift({ message: message, prediction: data.prediction, time: timeString });
                    renderHistory();

                } catch (error) {
                    loadingIndicator.classList.add('hidden');
                    resultText.innerText = 'Analysis Error';
                    resultContainer.className = 'mt-6 p-6 rounded-xl bg-white/10 border border-white/30 text-white';
                    resultContainer.classList.remove('hidden');

                } finally {
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                    messageInput.value = ''; 
                }
            });
        });
    </script>
</body>
</html>
